<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break Cup | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-container">
        
        <div class="login-design-side">
            <div class="design-overlay"></div>
            <div class="design-content">
                <div class="animated-coffee-emoji">☕</div>
                <h2 class="design-title">Welcome  to <br><span>Break Cup</span></h2>
                <p class="design-subtitle">Log in to check your reward points, view favorite blends, and skip the morning pickup lines.</p>
            </div>
        </div>

        <div class="login-form-side">
            <a href="index.html" class="back-home-link">&larr; Back to Shop</a>

            <div class="form-wrapper">
                <h3 class="form-title">Sign In</h3>
                <p class="form-subtitle">Freshly roasted moments are just a login away.</p>

                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-submit-btn">
                        <span>Brew My Account</span>
                    </button>
                </form>

                <p class="signup-prompt">New to the cafe? <a href="signup.html">Create an account</a></p>
            </div>
        </div>

    </div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.querySelector('.login-submit-btn');

        btn.innerHTML = '⚡ Pouring Account...';
        btn.disabled = true;

        try {
            //REAL API CALL TO BACKEND
            const response = await fetch('http://localhost:5000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.success) {
                alert(data.message);
                
                // Save session info to remember who is ordering
                localStorage.setItem('userEmail', email);
                localStorage.setItem('username', data.username);
                
                window.location.href = 'index.html'; // Go to main shop
            } else {
                alert(data.message);
                btn.innerHTML = 'Brew My Account';
                btn.disabled = false;
            }
        } catch (error) {
            alert("Could not reach backend API server workspace.");
            btn.innerHTML = 'Brew My Account';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
